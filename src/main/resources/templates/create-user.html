<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layouts/template"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>New User Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">User Registration</h2>

            <form th:action="@{/users/create}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" th:field="*{firstName}" id="firstName" placeholder="Enter first name">
                    <div class="invalid-feedback d-block">
                        <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" th:field="*{lastName}" id="lastName" placeholder="Enter last name">
                    <div class="invalid-feedback d-block">
                        <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" id="email" placeholder="Enter email">
                    <div class="invalid-feedback d-block">
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" id="password" placeholder="Enter password">
                    <div class="invalid-feedback d-block">
                        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                    </div>
                    <small class="form-text text-muted">Password must be at least 6 characters, with at least one letter and one number.</small>
                </div>

                <div class="mb-3 text-center">
                    <button type="reset" class="btn btn-outline-secondary me-2">Clear</button>
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>

            <p class="text-center mt-3">Already have an account?
                <a th:href="@{/login}">Login here</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
